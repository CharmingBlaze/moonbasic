name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libenet-dev libgl1-mesa-dev libxi-dev libxcursor-dev libxrandr-dev libxinerama-dev libwayland-dev libxkbcommon-dev
      - name: Build moonbasic
        run: go build -o moonbasic .
        env:
          CGO_ENABLED: '1'
      - name: Docs site
        run: go run ./cmd/moondoc -out site-out
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: moonbasic-linux-amd64
          path: |
            moonbasic
            site-out/

  windows-zip:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-raylib
      - name: Build
        run: go build -o moonbasic.exe .
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}\mingw64\bin\gcc.exe
          CGO_LDFLAGS: '-lraylib -lgdi32 -lwinmm -lws2_32'
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: moonbasic-windows-amd64
          path: moonbasic.exe

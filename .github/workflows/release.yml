# Build and publish archives when a version tag is pushed (e.g. v1.2.1).
# Artifacts: moonbasic-<tag>-linux-amd64.tar.gz, moonbasic-<tag>-windows-amd64.zip
# Each contains: moonbasic (compiler/LSP), moonrun (full runtime engine).

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            gcc \
            g++ \
            libenet-dev \
            libgl1-mesa-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libwayland-dev \
            libxkbcommon-dev

      # Rebuild Jolt + wrapper so moonrun links against symbols expected by vendored jolt-go (committed .a may lag).
      - name: Checkout Jolt Physics
        uses: actions/checkout@v4
        with:
          repository: jrouwe/JoltPhysics
          ref: v5.4.0
          path: JoltPhysics

      - name: Build Jolt static libraries (Linux)
        run: |
          set -e
          JOLT_SRC="${GITHUB_WORKSPACE}/JoltPhysics"
          mkdir -p "$JOLT_SRC/Build/linux_amd64_release"
          cd "$JOLT_SRC/Build/linux_amd64_release"
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_CXX_FLAGS="-fno-lto" \
            -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=OFF \
            -DDISABLE_CUSTOM_ALLOCATOR=ON \
            -DTARGET_UNIT_TESTS=OFF \
            -DTARGET_HELLO_WORLD=OFF \
            -DTARGET_PERFORMANCE_TEST=OFF \
            -DTARGET_SAMPLES=OFF \
            -DTARGET_VIEWER=OFF
          cmake --build . -j"$(nproc)"
          WRAPPER="${GITHUB_WORKSPACE}/third_party/jolt-go/jolt/wrapper"
          OUT="${GITHUB_WORKSPACE}/third_party/jolt-go/jolt/lib/linux_amd64"
          mkdir -p "$OUT"
          cd "$WRAPPER"
          for src in *.cpp; do
            g++ -std=c++17 -I"$JOLT_SRC" -DNDEBUG -DJPH_DISABLE_CUSTOM_ALLOCATOR \
              -DJPH_PROFILE_ENABLED -DJPH_DEBUG_RENDERER -DJPH_OBJECT_STREAM \
              -fPIC -fno-lto -c "$src" -o "${src%.cpp}.o"
          done
          ar rcs libjolt_wrapper.a *.o
          rm -f *.o
          cp libjolt_wrapper.a "$OUT/"
          cp "$JOLT_SRC/Build/linux_amd64_release/libJolt.a" "$OUT/"
          ls -lh "$OUT/"

      - name: Build moonbasic + moonrun
        env:
          CGO_ENABLED: '1'
        run: |
          set -e
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/moonbasic .
          go build -trimpath -ldflags="-s -w" -tags fullruntime -o dist/moonrun ./cmd/moonrun
          cp packaging/README-RELEASE.txt dist/README-RELEASE.txt

      - name: Package (tar.gz)
        run: |
          tar czvf "moonbasic-${GITHUB_REF_NAME}-linux-amd64.tar.gz" \
            -C dist moonbasic moonrun README-RELEASE.txt

      - uses: actions/upload-artifact@v4
        with:
          name: moonbasic-linux-amd64
          path: moonbasic-${{ github.ref_name }}-linux-amd64.tar.gz

  windows-amd64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-raylib

      # moonrun (-tags fullruntime) links Jolt; build Windows .a from JoltPhysics v5.4.0 (CMake under Build/).
      - name: Checkout Jolt Physics
        uses: actions/checkout@v4
        with:
          repository: jrouwe/JoltPhysics
          ref: v5.4.0
          path: JoltPhysics

      - name: Build Jolt static libraries (Windows)
        shell: pwsh
        env:
          JPH_SRC: ${{ github.workspace }}/JoltPhysics
        run: |
          $msys = "${{ steps.msys2.outputs.msys2-location }}"
          $mingwBin = Join-Path $msys "mingw64\bin"
          $env:Path = "$mingwBin;$env:Path"
          Set-Location "${{ github.workspace }}"
          powershell -ExecutionPolicy Bypass -File "third_party/jolt-go/scripts/build-libs-windows.ps1"

      - name: Build moonbasic + moonrun
        shell: bash
        env:
          CGO_ENABLED: '1'
          CC: ${{ steps.msys2.outputs.msys2-location }}/mingw64/bin/gcc.exe
          CGO_LDFLAGS: '-lraylib -lgdi32 -lwinmm -lws2_32'
        run: |
          set -e
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o dist/moonbasic.exe .
          go build -trimpath -ldflags="-s -w" -tags fullruntime -o dist/moonrun.exe ./cmd/moonrun
          cp packaging/README-RELEASE.txt dist/README-RELEASE.txt

      - name: Package (zip)
        shell: pwsh
        run: |
          $name = "moonbasic-${{ github.ref_name }}-windows-amd64.zip"
          Compress-Archive -Path dist/* -DestinationPath $name -Force

      - uses: actions/upload-artifact@v4
        with:
          name: moonbasic-windows-amd64
          path: moonbasic-${{ github.ref_name }}-windows-amd64.zip

  github-release:
    needs: [linux-amd64, windows-amd64]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: moonbasic-*
          merge-multiple: true

      - name: Collect archives for upload
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp -v {} upload/ \;
          ls -la upload/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: upload/*
          generate_release_notes: true
          body: |
            **Quick install:** Download the `.zip` (**Windows**) or `.tar.gz` (**Linux x64**), extract anywhere, and open **README-RELEASE.txt** inside the folder.

            | File | Contents |
            |------|----------|
            | `moonbasic` / `moonbasic.exe` | Compiler (`--check`, compile to `.mbc`, `--lsp`) |
            | `moonrun` / `moonrun.exe` | Full runtime — run `.mb` / `.mbc` games |

            Docs: [Getting started](https://github.com/CharmingBlaze/moonbasic/blob/main/docs/GETTING_STARTED.md) · [Build from source](https://github.com/CharmingBlaze/moonbasic/blob/main/docs/BUILDING.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

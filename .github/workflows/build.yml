name: Build Zero-DLL Release

on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            output: moonbasic
          - os: windows-latest
            target: windows
            output: moonbasic.exe

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Install Dependencies (Linux)
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libx11-dev libxrandr-dev libxi-dev libgl1-mesa-dev libglu1-mesa-dev libxcursor-dev libxinerama-dev

      - name: Build Static moonBASIC (Linux)
        if: matrix.target == 'linux'
        run: go build -v -ldflags="-s -w" -o ${{ matrix.output }} .

      - name: Build Static moonBASIC (Windows)
        if: matrix.target == 'windows'
        run: go build -v -ldflags="-H windowsgui -s -w" -tags static -o ${{ matrix.output }} .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: moonbasic-${{ matrix.target }}
          path: ${{ matrix.output }}
